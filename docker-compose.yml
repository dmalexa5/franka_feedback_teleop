services:
  franka_feedback_teleop:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USER_UID=${USER_UID}
        - USER_GID=${USER_GID}
    container_name: franka_feedback_teleop
    network_mode: "host"
    privileged: true
    command: /bin/bash
    tty: true
    stdin_open: true
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    group_add:
      - "${SERIAL_GID}"
    volumes:
      - ./:/ros2_ws
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./limits.conf:/etc/security/limits.conf
      - /dev:/dev
    environment:
      QT_X11_NO_MITSHM: 1
      DISPLAY: $DISPLAY
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856
